services:
  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: src/BsBingo.Server/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - MongoDB__ConnectionString=mongodb://mongodb:27018
      - MongoDB__Database=bsbingo
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo-data:
