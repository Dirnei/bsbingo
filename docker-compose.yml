services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: src/BsBingo.Server/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__Database=bsbingo
    depends_on:
      - mongodb

volumes:
  mongo-data:
