services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ghcr.io/dirnei/bsbingo:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MongoDB__ConnectionString: mongodb://root:example@mongodb:27017/?authSource=admin
      MongoDB__Database: bsbingo
      # OAuth (optional – leave empty to disable login)
      # OAuth__GitHub__ClientId: ""
      # OAuth__GitHub__ClientSecret: ""
      # OAuth__Google__ClientId: ""
      # OAuth__Google__ClientSecret: ""
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
